<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="768" viewBox="0 0 1366 768" role="img" aria-labelledby="title desc">
  <title id="title">Exemplo da Avaliacao 02 - Tela inicial com 6 cards</title>
  <desc id="desc">Layout com cabecalho, corpo contendo seis cards coloridos e rodape.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f7fc"/>
      <stop offset="100%" stop-color="#e8eef9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1366" height="768" fill="url(#bg)"/>

  <rect x="60" y="28" width="1246" height="124" rx="18" fill="#0f3b66" filter="url(#shadow)"/>
  <text x="683" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" fill="#ffffff" font-weight="700">
    Tela Inicial - Portal da Turma
  </text>
  <text x="683" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#d9e7ff">
    Cabecalho estilizado com titulo principal
  </text>

  <rect x="60" y="180" width="1246" height="460" rx="18" fill="#ffffff" stroke="#c8d5eb" stroke-width="2" filter="url(#shadow)"/>

  <rect x="125" y="230" width="332" height="160" rx="16" fill="#ef4444"/>
  <rect x="517" y="230" width="332" height="160" rx="16" fill="#f97316"/>
  <rect x="909" y="230" width="332" height="160" rx="16" fill="#eab308"/>

  <rect x="125" y="430" width="332" height="160" rx="16" fill="#22c55e"/>
  <rect x="517" y="430" width="332" height="160" rx="16" fill="#3b82f6"/>
  <rect x="909" y="430" width="332" height="160" rx="16" fill="#a855f7"/>

  <text x="291" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#ffffff" font-weight="700">Card 1</text>
  <text x="683" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#ffffff" font-weight="700">Card 2</text>
  <text x="1075" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#1f2937" font-weight="700">Card 3</text>

  <text x="291" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#ffffff" font-weight="700">Card 4</text>
  <text x="683" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#ffffff" font-weight="700">Card 5</text>
  <text x="1075" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#ffffff" font-weight="700">Card 6</text>

  <rect x="60" y="664" width="1246" height="72" rx="14" fill="#1f2937" filter="url(#shadow)"/>
  <text x="683" y="708" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="600">
    Rodape estilizado
  </text>
</svg>
