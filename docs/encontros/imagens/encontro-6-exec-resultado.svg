<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="920" viewBox="0 0 1200 920" role="img" aria-label="Exemplo visual do exercício do Encontro 6">
  <rect width="1200" height="920" fill="#f8fafc"/>
  <text x="80" y="54" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">Resultado esperado do exercício - Encontro 6</text>

  <rect x="80" y="88" width="1040" height="790" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="80" y="88" width="1040" height="48" rx="16" fill="#e2e8f0"/>
  <circle cx="112" cy="112" r="7" fill="#ef4444"/>
  <circle cx="136" cy="112" r="7" fill="#f59e0b"/>
  <circle cx="160" cy="112" r="7" fill="#22c55e"/>
  <text x="190" y="118" font-family="Arial, sans-serif" font-size="15" fill="#475569">index.html</text>

  <g font-family="Arial, sans-serif">
    <text x="126" y="188" font-size="42" font-weight="700" fill="#0f172a">Padrões Web - Unidade 1</text>
    <text x="126" y="226" font-size="21" fill="#334155">Estrutura semântica inicial com landmarks.</text>

    <text x="126" y="272" font-size="22" fill="#1d4ed8">Objetivos</text>
    <line x1="126" y1="277" x2="220" y2="277" stroke="#1d4ed8" stroke-width="1.4"/>
    <text x="236" y="272" font-size="22" fill="#64748b">|</text>
    <text x="256" y="272" font-size="22" fill="#1d4ed8">Conteúdos</text>
    <line x1="256" y1="277" x2="360" y2="277" stroke="#1d4ed8" stroke-width="1.4"/>
    <text x="376" y="272" font-size="22" fill="#64748b">|</text>
    <text x="396" y="272" font-size="22" fill="#1d4ed8">Referências</text>
    <line x1="396" y1="277" x2="515" y2="277" stroke="#1d4ed8" stroke-width="1.4"/>

    <text x="126" y="332" font-size="33" font-weight="700" fill="#0f172a">Objetivos da Aula</text>
    <text x="145" y="368" font-size="22" fill="#1f2937">- Aplicar elementos semânticos do HTML5.</text>
    <text x="145" y="398" font-size="22" fill="#1f2937">- Organizar a página por regiões com significado.</text>
    <text x="145" y="428" font-size="22" fill="#1f2937">- Melhorar legibilidade e manutenção do código.</text>

    <text x="126" y="492" font-size="33" font-weight="700" fill="#0f172a">Conteúdos Trabalhados</text>
    <text x="126" y="528" font-size="28" font-weight="700" fill="#0f172a">Landmarks principais</text>
    <text x="126" y="560" font-size="21" fill="#334155">Nesta etapa, vamos usar header, nav, main, section, article, aside e footer</text>
    <text x="126" y="590" font-size="21" fill="#334155">para estruturar páginas com função bem definida.</text>

    <text x="126" y="654" font-size="33" font-weight="700" fill="#0f172a">Dica de Estudo</text>
    <text x="126" y="686" font-size="21" fill="#334155">Abra o DevTools e observe a árvore HTML para validar a estrutura semântica.</text>

    <text x="126" y="752" font-size="21" fill="#334155">Material de apoio: MDN Web Docs.</text>
    <text x="126" y="790" font-size="22" fill="#1d4ed8">Voltar ao início</text>
    <line x1="126" y1="795" x2="254" y2="795" stroke="#1d4ed8" stroke-width="1.4"/>
  </g>
