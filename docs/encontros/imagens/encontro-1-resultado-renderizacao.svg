<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700" role="img" aria-labelledby="title desc">
  <title id="title">Exemplo de renderização de HTML, CSS e JavaScript</title>
  <desc id="desc">Simulação visual de uma página de cadastro estilizada, com botão e mensagem de retorno.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f7ff" />
      <stop offset="100%" stop-color="#e8f0ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1100" height="700" fill="url(#bg)"/>

  <rect x="120" y="70" width="860" height="560" rx="16" fill="#ffffff" filter="url(#shadow)"/>

  <rect x="120" y="70" width="860" height="44" rx="16" fill="#f8fafc"/>
  <circle cx="150" cy="92" r="7" fill="#ef4444"/>
  <circle cx="172" cy="92" r="7" fill="#f59e0b"/>
  <circle cx="194" cy="92" r="7" fill="#10b981"/>
  <text x="235" y="97" font-family="Arial, sans-serif" font-size="15" fill="#334155">http://localhost:5500/encontro-1.html</text>

  <text x="170" y="165" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Cadastro de Aluno</text>
  <text x="170" y="198" font-family="Arial, sans-serif" font-size="18" fill="#334155">Exemplo de resultado após executar HTML + CSS + JavaScript</text>

  <text x="170" y="245" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">Nome</text>
  <rect x="170" y="255" width="420" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="186" y="283" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8">Digite seu nome</text>

  <text x="170" y="335" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">E-mail</text>
  <rect x="170" y="345" width="420" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="186" y="373" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8">seuemail@exemplo.com</text>

  <rect x="170" y="420" width="180" height="46" rx="10" fill="#0f4c81"/>
  <text x="223" y="449" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Enviar</text>

  <rect x="170" y="490" width="520" height="62" rx="10" fill="#ecfdf5" stroke="#34d399"/>
  <text x="188" y="526" font-family="Arial, sans-serif" font-size="18" fill="#065f46">Cadastro de Ana enviado com sucesso.</text>

  <text x="720" y="248" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1f2937">Camadas da Web</text>
  <rect x="720" y="265" width="210" height="44" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="787" y="293" font-family="Arial, sans-serif" font-size="15" fill="#9a3412">HTML</text>
  <rect x="720" y="322" width="210" height="44" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="790" y="350" font-family="Arial, sans-serif" font-size="15" fill="#1d4ed8">CSS</text>
  <rect x="720" y="379" width="210" height="44" rx="8" fill="#fefce8" stroke="#fde047"/>
  <text x="772" y="407" font-family="Arial, sans-serif" font-size="15" fill="#854d0e">JavaScript</text>
</svg>
